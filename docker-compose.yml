version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ocp_user
      POSTGRES_PASSWORD: ocp_password
      POSTGRES_DB: ocp_dashboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocp_user -d ocp_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend-pfe
    ports:
      - "8000:8000"
    env_file:
      - ./backend-pfe/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend-pfe:/app
    restart: on-failure

  frontend:
    build: ./dashboard-pfe
    ports:
      - "3000:5173"
    depends_on:
      - backend

volumes:
  pgdata: